name: Lint & Format

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-format:
    name: ESLint + Prettier (with auto-fix)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix formatting (Prettier)
        run: npx prettier --write "**/*.{js,ts,vue,json,css,scss,md}"

      - name: Fix lint issues (ESLint)
        run: npx eslint . --ext .js,.ts,.vue --fix --max-warnings 0

      - name: Commit auto-fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint and formatting issues"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"